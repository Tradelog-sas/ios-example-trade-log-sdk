# Variante SPM: la dependencia del SDK se resuelve con Swift Package Manager.
#   xcodegen generate --spec project-spm.yml
name: TradelogDemo

options:
  bundleIdPrefix: com.tradelog.demo
  deploymentTarget:
    iOS: "15.0"
  createIntermediateGroups: true

# El SDK se consume como paquete SwiftPM local, descargado por el CLI de Tradelog
# (`tradelog install` → Tradelog/TradelogSupport). Trae xcframeworks Universal
# (simulador + device), igual que lo haría un cliente real.
packages:
  TradelogSupport:
    path: Tradelog/TradelogSupport

targets:
  TradelogDemo:
    type: application
    platform: iOS
    sources:
      - path: Sources
    dependencies:
      - package: TradelogSupport
        product: TradelogSupport
    info:
      path: Sources/Info.plist
      properties:
        CFBundleDisplayName: Tradelog Demo
        UILaunchScreen: {}
        NSMicrophoneUsageDescription: "Usamos el micrófono para que puedas enviar mensajes de voz en el chat de soporte."
        ITSAppUsesNonExemptEncryption: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tradelog.demo.app
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_VERSION: "5.0"
        GENERATE_INFOPLIST_FILE: NO
